name: Build OKNG Inspector Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows portable package
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11 x64
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Print diagnostics
        shell: cmd
        run: |
          python --version
          python -m pip --version
          cd
          dir

      - name: Run build_windows.bat
        shell: cmd
        run: build_windows.bat

      - name: Verify build outputs
        shell: cmd
        run: |
          if not exist dist\OKNG_Inspector_Windows\OKNG_Inspector.exe (
            echo Missing dist\OKNG_Inspector_Windows\OKNG_Inspector.exe
            exit /b 1
          )
          if not exist dist\OKNG_Inspector_Windows_v0.1.zip (
            echo Missing dist\OKNG_Inspector_Windows_v0.1.zip
            exit /b 1
          )
          for %%A in (dist\OKNG_Inspector_Windows_v0.1.zip) do echo Zip size bytes: %%~zA

      - name: Run smoke test
        shell: cmd
        run: python scripts\smoke_test_windows.py --from-zip --require-packaged-exe

      - name: Print smoke test summary
        if: always()
        shell: cmd
        run: |
          if exist smoke_test_outputs\smoke_test_summary.json (
            type smoke_test_outputs\smoke_test_summary.json
          ) else (
            echo smoke_test_summary.json was not created
          )

      - name: Publish CI diagnostics branch
        if: always()
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B ci-diagnostics origin/main
          if (Test-Path ci_diagnostics/latest) {
            Remove-Item ci_diagnostics/latest -Recurse -Force
          }
          New-Item -ItemType Directory -Force ci_diagnostics/latest | Out-Null
          if (Test-Path smoke_test_outputs) {
            Copy-Item smoke_test_outputs/smoke_test_summary.json ci_diagnostics/latest/ -ErrorAction SilentlyContinue
            Copy-Item smoke_test_outputs/smoke_test_log.txt ci_diagnostics/latest/ -ErrorAction SilentlyContinue
            Copy-Item smoke_test_outputs/streamlit_*.log ci_diagnostics/latest/ -ErrorAction SilentlyContinue
          }
          "run_id=${env:GITHUB_RUN_ID}" | Out-File ci_diagnostics/latest/run_info.txt -Encoding utf8
          "run_url=https://github.com/${env:GITHUB_REPOSITORY}/actions/runs/${env:GITHUB_RUN_ID}" | Add-Content ci_diagnostics/latest/run_info.txt -Encoding utf8
          git add ci_diagnostics/latest
          git commit -m "Update CI diagnostics ${env:GITHUB_RUN_ID}" || exit 0
          git push origin ci-diagnostics --force

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OKNG_Inspector_Windows_v0.1
          path: |
            dist/OKNG_Inspector_Windows_v0.1.zip
            smoke_test_outputs/**
            dist/OKNG_Inspector_Setup_v0.1.exe
          if-no-files-found: warn
          retention-days: 3
